name: TinLLM Engine CI Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up GCC & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make python3

    - name: Build C Engine (ARCH=x86-64-v3)
      run: |
        cd c
        make clean
        make ARCH=x86-64-v3

    - name: Execute C Engine Unit Test Suite
      run: |
        cd c
        make test

    - name: Verify CLI Diagnostics
      run: |
        ./c/tin doctor
        ./c/tin plan

    - name: Run Python Gateway & Tools Test
      run: |
        python3 c/tools/inspect_weights.py .
        python3 c/tools/export_service.py
